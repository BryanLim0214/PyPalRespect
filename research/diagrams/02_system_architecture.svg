<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480">
  <!-- ACM-Style System Architecture: Clean, white background, icons, minimal text -->
  
  <!-- Background -->
  <rect width="700" height="480" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold">System Architecture</text>
  
  <!-- TIER 1: Frontend -->
  <rect x="40" y="50" width="620" height="110" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="60" y="72" fill="#1e40af" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold">PRESENTATION LAYER</text>
  
  <!-- Frontend boxes with icons -->
  <g transform="translate(60,82)">
    <rect width="130" height="60" rx="6" fill="#3b82f6"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">🖥️</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">React UI</text>
  </g>
  
  <g transform="translate(210,82)">
    <rect width="130" height="60" rx="6" fill="#3b82f6"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">📝</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Code Editor</text>
  </g>
  
  <g transform="translate(360,82)">
    <rect width="130" height="60" rx="6" fill="#3b82f6"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">⏱️</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Break Timer</text>
  </g>
  
  <g transform="translate(510,82)">
    <rect width="130" height="60" rx="6" fill="#3b82f6"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">📊</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Progress</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 350 160 L 350 175" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="350,180 345,172 355,172" fill="#64748b"/>

  <!-- TIER 2: Backend -->
  <rect x="40" y="185" width="620" height="110" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="60" y="207" fill="#166534" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold">APPLICATION LAYER (FastAPI)</text>
  
  <g transform="translate(60,217)">
    <rect width="130" height="60" rx="6" fill="#22c55e"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">🔐</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Auth (COPPA)</text>
  </g>
  
  <g transform="translate(210,217)">
    <rect width="130" height="60" rx="6" fill="#22c55e"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">🎓</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Tutor Service</text>
  </g>
  
  <g transform="translate(360,217)">
    <rect width="130" height="60" rx="6" fill="#22c55e"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">📚</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Exercises</text>
  </g>
  
  <g transform="translate(510,217)">
    <rect width="130" height="60" rx="6" fill="#22c55e"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">📈</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Analytics</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 350 295 L 350 310" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="350,315 345,307 355,307" fill="#64748b"/>

  <!-- TIER 3: AI + Data -->
  <rect x="40" y="320" width="620" height="110" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="60" y="342" fill="#7e22ce" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold">AI + DATA LAYER</text>
  
  <g transform="translate(60,352)">
    <rect width="130" height="60" rx="6" fill="#a855f7"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">🤖</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Gemini API</text>
  </g>
  
  <g transform="translate(210,352)">
    <rect width="130" height="60" rx="6" fill="#a855f7"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">💡</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Hint Generator</text>
  </g>
  
  <g transform="translate(360,352)">
    <rect width="130" height="60" rx="6" fill="#a855f7"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">🧩</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Task Decomposer</text>
  </g>
  
  <g transform="translate(510,352)">
    <rect width="130" height="60" rx="6" fill="#a855f7"/>
    <text x="65" y="25" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="24">🗄️</text>
    <text x="65" y="48" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">Database</text>
  </g>
  
  <!-- Footer -->
  <text x="350" y="460" text-anchor="middle" fill="#999" font-family="Helvetica, Arial, sans-serif" font-size="9">React 19 + TypeScript | FastAPI + Python 3.11 | Google Gemini + SQLAlchemy 2.0</text>
</svg>
