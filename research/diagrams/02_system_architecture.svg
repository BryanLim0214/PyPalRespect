<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad2)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="22" font-weight="bold">NeuroCode System Architecture</text>
  <text x="450" y="55" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">3-Tier Architecture for ADHD-Focused Python Tutoring</text>
  
  <!-- TIER 1: Frontend -->
  <rect x="50" y="80" width="800" height="130" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="105" fill="#3b82f6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">FRONTEND (React 19 + TypeScript)</text>
  
  <!-- Frontend boxes -->
  <rect x="70" y="120" width="170" height="70" rx="8" fill="#2563eb"/>
  <text x="155" y="150" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">ADHD-Friendly UI</text>
  <text x="155" y="170" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="10">Reduced animations</text>
  
  <rect x="260" y="120" width="170" height="70" rx="8" fill="#2563eb"/>
  <text x="345" y="150" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Code Editor</text>
  <text x="345" y="170" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="10">CodeMirror 6</text>
  
  <rect x="450" y="120" width="170" height="70" rx="8" fill="#2563eb"/>
  <text x="535" y="150" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Break Timer</text>
  <text x="535" y="170" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="10">20-min reminders</text>
  
  <rect x="640" y="120" width="170" height="70" rx="8" fill="#2563eb"/>
  <text x="725" y="150" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Progress Tracker</text>
  <text x="725" y="170" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="10">Gamification</text>
  
  <!-- Arrows down -->
  <path d="M 450 210 L 450 235" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- TIER 2: Backend -->
  <rect x="50" y="240" width="800" height="130" rx="10" fill="#1e3a3a" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="265" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">BACKEND (FastAPI + Python 3.11)</text>
  
  <!-- Backend boxes -->
  <rect x="70" y="280" width="170" height="70" rx="8" fill="#059669"/>
  <text x="155" y="310" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Auth Service</text>
  <text x="155" y="330" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">COPPA Compliant</text>
  
  <rect x="260" y="280" width="170" height="70" rx="8" fill="#059669"/>
  <text x="345" y="310" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Tutor Service</text>
  <text x="345" y="330" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">LLM Integration</text>
  
  <rect x="450" y="280" width="170" height="70" rx="8" fill="#059669"/>
  <text x="535" y="310" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Exercise Manager</text>
  <text x="535" y="330" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">15 Lessons</text>
  
  <rect x="640" y="280" width="170" height="70" rx="8" fill="#059669"/>
  <text x="725" y="310" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Analytics Engine</text>
  <text x="725" y="330" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Research Metrics</text>
  
  <!-- Arrows down -->
  <path d="M 450 370 L 450 395" stroke="#64748b" stroke-width="2"/>
  
  <!-- TIER 3: AI and Data -->
  <rect x="50" y="400" width="800" height="130" rx="10" fill="#3b1e3f" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="425" fill="#a855f7" font-family="Arial, sans-serif" font-size="14" font-weight="bold">AI + DATA LAYER</text>
  
  <!-- AI boxes -->
  <rect x="70" y="440" width="170" height="70" rx="8" fill="#7c3aed"/>
  <text x="155" y="470" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Google Gemini</text>
  <text x="155" y="490" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="10">gemini-2.0-flash</text>
  
  <rect x="260" y="440" width="170" height="70" rx="8" fill="#7c3aed"/>
  <text x="345" y="470" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Hint Generator</text>
  <text x="345" y="490" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="10">4-Level Escalation</text>
  
  <rect x="450" y="440" width="170" height="70" rx="8" fill="#7c3aed"/>
  <text x="535" y="470" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Task Decomposer</text>
  <text x="535" y="490" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="10">3-5 Micro-steps</text>
  
  <rect x="640" y="440" width="170" height="70" rx="8" fill="#7c3aed"/>
  <text x="725" y="470" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">SQLite/PostgreSQL</text>
  <text x="725" y="490" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="10">SQLAlchemy 2.0</text>
  
  <!-- Footer -->
  <text x="450" y="570" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11">Based on actual project structure: neurocode/backend/app/</text>
</svg>
