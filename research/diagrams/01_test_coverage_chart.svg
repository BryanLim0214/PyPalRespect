<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <!-- ACM-Style: Light background, horizontal bars, clear labels, grayscale-friendly -->
  
  <!-- Background -->
  <rect width="700" height="400" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">Test Coverage Distribution</text>
  <text x="350" y="50" text-anchor="middle" fill="#666" font-family="Helvetica, Arial, sans-serif" font-size="12">n = 259 tests, 99.6% pass rate</text>
  
  <!-- Y-axis labels and bars -->
  <!-- Curriculum: 68 -->
  <text x="140" y="88" text-anchor="end" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11">Curriculum</text>
  <rect x="150" y="75" width="340" height="22" rx="2" fill="#2563eb"/>
  <text x="500" y="90" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="bold">68</text>
  
  <!-- AI/LLM: 47 -->
  <text x="140" y="123" text-anchor="end" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11">AI/LLM</text>
  <rect x="150" y="110" width="235" height="22" rx="2" fill="#7c3aed"/>
  <text x="395" y="125" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="bold">47</text>
  
  <!-- ADHD Features: 34 -->
  <text x="140" y="158" text-anchor="end" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11">ADHD Features</text>
  <rect x="150" y="145" width="170" height="22" rx="2" fill="#059669"/>
  <text x="330" y="160" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="bold">34</text>
  
  <!-- Edge Cases: 34 -->
  <text x="140" y="193" text-anchor="end" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11">Edge Cases</text>
  <rect x="150" y="180" width="170" height="22" rx="2" fill="#d97706"/>
  <text x="330" y="195" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="bold">34</text>
  
  <!-- Security: 30 -->
  <text x="140" y="228" text-anchor="end" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11">Security/COPPA</text>
  <rect x="150" y="215" width="150" height="22" rx="2" fill="#dc2626"/>
  <text x="310" y="230" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="bold">30</text>
  
  <!-- Code Execution: 28 -->
  <text x="140" y="263" text-anchor="end" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11">Code Sandbox</text>
  <rect x="150" y="250" width="140" height="22" rx="2" fill="#0891b2"/>
  <text x="300" y="265" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="bold">28</text>
  
  <!-- Analytics: 18 -->
  <text x="140" y="298" text-anchor="end" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11">Analytics</text>
  <rect x="150" y="285" width="90" height="22" rx="2" fill="#db2777"/>
  <text x="250" y="300" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="bold">18</text>
  
  <!-- X-axis -->
  <line x1="150" y1="320" x2="550" y2="320" stroke="#ccc" stroke-width="1"/>
  <text x="150" y="340" fill="#666" font-family="Helvetica, Arial, sans-serif" font-size="10">0</text>
  <text x="250" y="340" fill="#666" font-family="Helvetica, Arial, sans-serif" font-size="10">20</text>
  <text x="350" y="340" fill="#666" font-family="Helvetica, Arial, sans-serif" font-size="10">40</text>
  <text x="450" y="340" fill="#666" font-family="Helvetica, Arial, sans-serif" font-size="10">60</text>
  <text x="550" y="340" fill="#666" font-family="Helvetica, Arial, sans-serif" font-size="10">80</text>
  
  <text x="350" y="365" text-anchor="middle" fill="#666" font-family="Helvetica, Arial, sans-serif" font-size="11">Number of Tests</text>
  
  <!-- Source -->
  <text x="350" y="390" text-anchor="middle" fill="#999" font-family="Helvetica, Arial, sans-serif" font-size="9">Source: pytest --collect-only (16 test files)</text>
</svg>
