<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">NeuroCode Test Coverage by Category</text>
  <text x="400" y="65" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">259 Total Tests | 99.6% Pass Rate</text>
  
  <!-- Bar Chart - Based on actual test counts -->
  <!-- Curriculum: 68 tests -->
  <rect x="80" y="100" width="340" height="40" rx="5" fill="#3b82f6"/>
  <text x="90" y="125" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Curriculum (68)</text>
  <text x="410" y="125" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">test_curriculum, test_all_exercises, test_exercise_validation</text>
  
  <!-- AI/LLM: 47 tests -->
  <rect x="80" y="150" width="235" height="40" rx="5" fill="#8b5cf6"/>
  <text x="90" y="175" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">AI/LLM Integration (47)</text>
  <text x="325" y="175" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">test_gemini_service, test_hint_generator, test_prompts</text>
  
  <!-- ADHD Features: 34 tests -->
  <rect x="80" y="200" width="170" height="40" rx="5" fill="#10b981"/>
  <text x="90" y="225" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">ADHD Features (34)</text>
  <text x="260" y="225" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">test_human_perspective, test_student_experience</text>
  
  <!-- Edge Cases: 34 tests -->
  <rect x="80" y="250" width="170" height="40" rx="5" fill="#f59e0b"/>
  <text x="90" y="275" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Edge Cases (34)</text>
  <text x="260" y="275" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">test_edge_cases, test_config</text>
  
  <!-- Security/COPPA: 30 tests -->
  <rect x="80" y="300" width="150" height="40" rx="5" fill="#ef4444"/>
  <text x="90" y="325" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Security/COPPA (30)</text>
  <text x="240" y="325" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">test_security, test_auth</text>
  
  <!-- Code Execution: 28 tests -->
  <rect x="80" y="350" width="140" height="40" rx="5" fill="#06b6d4"/>
  <text x="90" y="375" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Code Execution (28)</text>
  <text x="230" y="375" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">test_code_runner (sandbox security)</text>
  
  <!-- Analytics: 18 tests -->
  <rect x="80" y="400" width="90" height="40" rx="5" fill="#ec4899"/>
  <text x="90" y="425" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Analytics (18)</text>
  <text x="180" y="425" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">test_analytics, test_models</text>
  
  <!-- Legend -->
  <text x="400" y="475" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="11">Data from pytest --collect-only | December 2025</text>
</svg>
