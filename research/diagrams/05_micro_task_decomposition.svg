<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320">
  <!-- ACM-Style Micro-task Decomposition: Horizontal flow -->
  
  <!-- Background -->
  <rect width="700" height="320" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold">Micro-Task Decomposition for ADHD</text>
  
  <!-- Left: Complex Problem (scary) -->
  <g transform="translate(30,55)">
    <rect width="150" height="180" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="75" y="35" text-anchor="middle" fill="#000" font-family="Helvetica, Arial, sans-serif" font-size="36">😰</text>
    <text x="75" y="65" text-anchor="middle" fill="#991b1b" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold">Complex Task</text>
    <text x="75" y="90" text-anchor="middle" fill="#666" font-family="monospace" font-size="9"># Build a guessing</text>
    <text x="75" y="105" text-anchor="middle" fill="#666" font-family="monospace" font-size="9"># game with loops,</text>
    <text x="75" y="120" text-anchor="middle" fill="#666" font-family="monospace" font-size="9"># input, random...</text>
    <text x="75" y="155" text-anchor="middle" fill="#dc2626" font-family="Helvetica, Arial, sans-serif" font-size="10">Overwhelming</text>
    <text x="75" y="170" text-anchor="middle" fill="#dc2626" font-family="Helvetica, Arial, sans-serif" font-size="10">for ADHD students</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(190,130)">
    <path d="M 0 15 L 50 15" stroke="#64748b" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="55,15 48,10 48,20" fill="#64748b"/>
  </g>
  
  <!-- Center: AI Decomposer -->
  <g transform="translate(255,90)">
    <rect width="100" height="110" rx="50" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="50" y="40" text-anchor="middle" fill="#000" font-family="Helvetica, Arial, sans-serif" font-size="32">🤖</text>
    <text x="50" y="65" text-anchor="middle" fill="#6b21a8" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold">Gemini</text>
    <text x="50" y="80" text-anchor="middle" fill="#6b21a8" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold">API</text>
    <text x="50" y="100" text-anchor="middle" fill="#a855f7" font-family="Helvetica, Arial, sans-serif" font-size="9">Decompose</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(365,130)">
    <path d="M 0 15 L 50 15" stroke="#64748b" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="55,15 48,10 48,20" fill="#64748b"/>
  </g>
  
  <!-- Right: Micro-steps (friendly) -->
  <g transform="translate(430,50)">
    <rect width="240" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="120" y="30" text-anchor="middle" fill="#166534" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="bold">3-5 Micro-Steps</text>
    
    <!-- Step boxes -->
    <rect x="15" y="45" width="210" height="25" rx="4" fill="#22c55e"/>
    <text x="25" y="62" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">1️⃣ Understand the goal (2 min)</text>
    
    <rect x="15" y="75" width="210" height="25" rx="4" fill="#3b82f6"/>
    <text x="25" y="92" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">2️⃣ Create variables (3 min)</text>
    
    <rect x="15" y="105" width="210" height="25" rx="4" fill="#f59e0b"/>
    <text x="25" y="122" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">3️⃣ Build the loop (3 min)</text>
    
    <rect x="15" y="135" width="210" height="25" rx="4" fill="#8b5cf6"/>
    <text x="25" y="152" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">4️⃣ Add logic (3 min)</text>
    
    <rect x="15" y="165" width="210" height="25" rx="4" fill="#06b6d4"/>
    <text x="25" y="182" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">5️⃣ Test and debug (3 min)</text>
  </g>
  
  <!-- Happy outcome -->
  <text x="550" y="270" text-anchor="middle" fill="#000" font-family="Helvetica, Arial, sans-serif" font-size="28">😊</text>
  <text x="550" y="290" text-anchor="middle" fill="#166534" font-family="Helvetica, Arial, sans-serif" font-size="10">Manageable!</text>
  
  <!-- Source -->
  <text x="350" y="310" text-anchor="middle" fill="#999" font-family="Helvetica, Arial, sans-serif" font-size="9">Source: task_decomposer.py | 13 tests | ~15 min total vs overwhelm</text>
</svg>
