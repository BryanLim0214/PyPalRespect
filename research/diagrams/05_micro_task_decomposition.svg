<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400">
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="850" height="400" fill="url(#bgGrad5)"/>
  
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Micro-Task Decomposition for ADHD Focus</text>
  <text x="425" y="50" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">From app/services/task_decomposer.py | 13 tests in test_task_decomposer.py</text>
  
  <!-- Left: Complex Problem -->
  <rect x="30" y="90" width="180" height="200" rx="10" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="120" y="120" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Complex Problem</text>
  <text x="50" y="150" fill="#fca5a5" font-family="monospace" font-size="10"># Build a number</text>
  <text x="50" y="165" fill="#fca5a5" font-family="monospace" font-size="10"># guessing game with</text>
  <text x="50" y="180" fill="#fca5a5" font-family="monospace" font-size="10"># loops, conditionals,</text>
  <text x="50" y="195" fill="#fca5a5" font-family="monospace" font-size="10"># and user input...</text>
  <text x="120" y="240" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="10">😰 Overwhelming</text>
  <text x="120" y="255" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="10">for ADHD students</text>
  
  <!-- Arrow -->
  <path d="M 210 190 L 270 190" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5"/>
  <polygon points="280,190 270,185 270,195" fill="#64748b"/>
  
  <!-- Center: AI Processing -->
  <rect x="285" y="140" width="120" height="100" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="345" y="175" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Gemini API</text>
  <text x="345" y="195" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">Task</text>
  <text x="345" y="210" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">Decomposer</text>
  
  <!-- Arrow -->
  <path d="M 405 190 L 465 190" stroke="#64748b" stroke-width="3" stroke-dasharray="5,5"/>
  <polygon points="475,190 465,185 465,195" fill="#64748b"/>
  
  <!-- Right: Micro-steps -->
  <rect x="480" y="70" width="350" height="300" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="655" y="95" text-anchor="middle" fill="#22c55e" font-family="Arial, sans-serif" font-size="14" font-weight="bold">3-5 Micro-Steps</text>
  
  <!-- Step 1 -->
  <rect x="500" y="110" width="310" height="45" rx="6" fill="#166534"/>
  <text x="520" y="130" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Step 1: Understand the Goal</text>
  <text x="520" y="145" fill="#86efac" font-family="Arial, sans-serif" font-size="10">Read requirements, identify inputs/outputs (2 min)</text>
  
  <!-- Step 2 -->
  <rect x="500" y="160" width="310" height="45" rx="6" fill="#1e40af"/>
  <text x="520" y="180" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Step 2: Set Up Variables</text>
  <text x="520" y="195" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">Create secret_number, guess, attempts (3 min)</text>
  
  <!-- Step 3 -->
  <rect x="500" y="210" width="310" height="45" rx="6" fill="#7c2d12"/>
  <text x="520" y="230" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Step 3: Build the Loop</text>
  <text x="520" y="245" fill="#fed7aa" font-family="Arial, sans-serif" font-size="10">Add while loop with condition (3 min)</text>
  
  <!-- Step 4 -->
  <rect x="500" y="260" width="310" height="45" rx="6" fill="#581c87"/>
  <text x="520" y="280" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Step 4: Add Logic</text>
  <text x="520" y="295" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="10">Implement higher/lower feedback (3 min)</text>
  
  <!-- Step 5 -->
  <rect x="500" y="310" width="310" height="45" rx="6" fill="#0f766e"/>
  <text x="520" y="330" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Step 5: Test &amp; Debug</text>
  <text x="520" y="345" fill="#5eead4" font-family="Arial, sans-serif" font-size="10">Run code, fix errors, celebrate! (3 min)</text>
  
  <!-- Footer -->
  <text x="425" y="385" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Each step designed for 2-3 minute focus windows | Validated in test_task_decomposer.py</text>
</svg>
