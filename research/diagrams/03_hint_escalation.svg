<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <!-- ACM-Style Hint Escalation: Clean flowchart with icons -->
  
  <!-- Background -->
  <rect width="600" height="420" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold">4-Level Adaptive Hint System</text>
  
  <!-- Frustration indicator on left -->
  <rect x="20" y="70" width="60" height="280" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="50" y="200" text-anchor="middle" fill="#dc2626" font-family="Helvetica, Arial, sans-serif" font-size="10" transform="rotate(-90, 50, 200)">Frustration Level ↑</text>
  
  <!-- Level 1: Conceptual -->
  <g transform="translate(100,60)">
    <rect width="420" height="70" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="40" y="40" fill="#000" font-family="Helvetica, Arial, sans-serif" font-size="28">💭</text>
    <text x="80" y="30" fill="#166534" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold">Level 1: Conceptual Nudge</text>
    <text x="80" y="50" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11" font-style="italic">"What tool helps you repeat things?"</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 310 130 L 310 145" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="310,150 305,143 315,143" fill="#94a3b8"/>
  
  <!-- Level 2: Directional -->
  <g transform="translate(100,155)">
    <rect width="420" height="70" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
    <text x="40" y="40" fill="#000" font-family="Helvetica, Arial, sans-serif" font-size="28">🧭</text>
    <text x="80" y="30" fill="#a16207" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold">Level 2: Directional</text>
    <text x="80" y="50" fill="#333" font-family="Helvetica, Arial, sans-serif" font-size="11" font-style="italic">"Use a for loop from 1 to 5"</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 310 225 L 310 240" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="310,245 305,238 315,238" fill="#94a3b8"/>
  
  <!-- Level 3: Partial Code -->
  <g transform="translate(100,250)">
    <rect width="420" height="70" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="40" y="40" fill="#000" font-family="Helvetica, Arial, sans-serif" font-size="28">🧩</text>
    <text x="80" y="30" fill="#c2410c" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold">Level 3: Partial Code</text>
    <text x="80" y="50" fill="#333" font-family="monospace" font-size="11">for i in range(___): ...</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 310 320 L 310 335" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="310,340 305,333 315,333" fill="#94a3b8"/>
  
  <!-- Level 4: Full Solution -->
  <g transform="translate(100,345)">
    <rect width="420" height="55" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="40" y="35" fill="#000" font-family="Helvetica, Arial, sans-serif" font-size="28">✅</text>
    <text x="80" y="25" fill="#dc2626" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold">Level 4: Full Solution</text>
    <text x="80" y="45" fill="#333" font-family="monospace" font-size="11">for i in range(1, 6): print(i)</text>
  </g>
  
  <!-- Source -->
  <text x="300" y="413" text-anchor="middle" fill="#999" font-family="Helvetica, Arial, sans-serif" font-size="9">Source: hint_generator.py | Tested: 15 unit tests</text>
</svg>
