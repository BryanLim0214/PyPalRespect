<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 480">
  <!-- ACM-Style COPPA Flow: Clean flowchart -->
  
  <!-- Background -->
  <rect width="550" height="480" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="275" y="28" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold">COPPA-Compliant Registration</text>
  
  <!-- Start -->
  <ellipse cx="275" cy="65" rx="70" ry="22" fill="#3b82f6"/>
  <text x="275" y="70" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="11">👤 Student Registers</text>
  
  <!-- Arrow -->
  <path d="M 275 87 L 275 105" stroke="#64748b" stroke-width="2"/>
  <polygon points="275,110 270,103 280,103" fill="#64748b"/>
  
  <!-- Decision: Age < 13? -->
  <polygon points="275,115 345,150 275,185 205,150" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="275" y="153" text-anchor="middle" fill="#92400e" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="bold">Age &lt; 13?</text>
  
  <!-- NO branch -->
  <line x1="345" y1="150" x2="440" y2="150" stroke="#22c55e" stroke-width="2"/>
  <text x="380" y="140" fill="#16a34a" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold">NO</text>
  <rect x="440" y="130" width="90" height="40" rx="6" fill="#22c55e"/>
  <text x="485" y="155" text-anchor="middle" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="10">✅ Activated</text>
  
  <!-- YES branch -->
  <line x1="275" y1="185" x2="275" y2="210" stroke="#f59e0b" stroke-width="2"/>
  <text x="285" y="200" fill="#d97706" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold">YES</text>
  
  <!-- Parent Email -->
  <rect x="185" y="215" width="180" height="45" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="275" y="243" text-anchor="middle" fill="#713f12" font-family="Helvetica, Arial, sans-serif" font-size="11">📧 Request Parent Email</text>
  
  <!-- Arrow -->
  <path d="M 275 260 L 275 280" stroke="#64748b" stroke-width="2"/>
  <polygon points="275,285 270,278 280,278" fill="#64748b"/>
  
  <!-- Consent Email Sent -->
  <rect x="185" y="290" width="180" height="45" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="275" y="318" text-anchor="middle" fill="#1e40af" font-family="Helvetica, Arial, sans-serif" font-size="11">✉️ Send Consent Link</text>
  
  <!-- Arrow -->
  <path d="M 275 335 L 275 355" stroke="#64748b" stroke-width="2"/>
  <polygon points="275,360 270,353 280,353" fill="#64748b"/>
  
  <!-- Decision: Approved? -->
  <polygon points="275,365 335,395 275,425 215,395" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="275" y="398" text-anchor="middle" fill="#6b21a8" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold">Approved?</text>
  
  <!-- NO branch -->
  <line x1="215" y1="395" x2="100" y2="395" stroke="#ef4444" stroke-width="2"/>
  <text x="160" y="385" fill="#dc2626" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold">NO</text>
  <rect x="20" y="375" width="80" height="40" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="60" y="400" text-anchor="middle" fill="#b91c1c" font-family="Helvetica, Arial, sans-serif" font-size="10">⏳ Pending</text>
  
  <!-- YES branch -->
  <line x1="335" y1="395" x2="400" y2="395" stroke="#22c55e" stroke-width="2"/>
  <text x="360" y="385" fill="#16a34a" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold">YES</text>
  <rect x="400" y="375" width="130" height="40" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="465" y="400" text-anchor="middle" fill="#166534" font-family="Helvetica, Arial, sans-serif" font-size="10">✅ Account Active</text>
  
  <!-- Compliance note -->
  <rect x="20" y="442" width="510" height="30" rx="4" fill="#f8fafc"/>
  <text x="275" y="461" text-anchor="middle" fill="#64748b" font-family="Helvetica, Arial, sans-serif" font-size="9">COPPA: Minimal PII • Birth year only • Parental verification required • 13 tests in test_auth.py</text>
</svg>
