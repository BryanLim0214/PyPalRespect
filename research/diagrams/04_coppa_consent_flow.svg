<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="600" fill="url(#bgGrad4)"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">COPPA-Compliant Registration Flow</text>
  <text x="350" y="50" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">From app/routers/auth.py | 13 tests in test_auth.py</text>
  
  <!-- Start -->
  <ellipse cx="350" cy="85" rx="80" ry="25" fill="#3b82f6"/>
  <text x="350" y="90" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Student Registration</text>
  
  <!-- Arrow -->
  <line x1="350" y1="110" x2="350" y2="135" stroke="#64748b" stroke-width="2"/>
  
  <!-- Decision: Age < 13? -->
  <polygon points="350,140 430,180 350,220 270,180" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="177" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Age &lt; 13?</text>
  <text x="350" y="192" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">(birth_year check)</text>
  
  <!-- NO branch (Age >= 13) -->
  <line x1="430" y1="180" x2="550" y2="180" stroke="#22c55e" stroke-width="2"/>
  <text x="480" y="170" fill="#22c55e" font-family="Arial, sans-serif" font-size="10">NO (≥13)</text>
  <rect x="550" y="160" width="130" height="40" rx="8" fill="#166534" stroke="#22c55e" stroke-width="2"/>
  <text x="615" y="185" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">Account Activated</text>
  
  <!-- YES branch (Age < 13) -->
  <line x1="350" y1="220" x2="350" y2="255" stroke="#f59e0b" stroke-width="2"/>
  <text x="365" y="240" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10">YES (&lt;13)</text>
  
  <!-- Parent Email Required -->
  <rect x="250" y="260" width="200" height="40" rx="8" fill="#854d0e" stroke="#eab308" stroke-width="2"/>
  <text x="350" y="285" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">Parent Email Required</text>
  
  <!-- Arrow -->
  <line x1="350" y1="300" x2="350" y2="330" stroke="#64748b" stroke-width="2"/>
  
  <!-- Consent Email Sent -->
  <rect x="250" y="335" width="200" height="40" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="360" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">Consent Email Sent</text>
  
  <!-- Arrow -->
  <line x1="350" y1="375" x2="350" y2="400" stroke="#64748b" stroke-width="2"/>
  
  <!-- Decision: Parent Approves? -->
  <polygon points="350,405 420,440 350,475 280,440" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="350" y="440" text-anchor="middle" fill="#a855f7" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Parent</text>
  <text x="350" y="453" text-anchor="middle" fill="#a855f7" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Approves?</text>
  
  <!-- NO branch -->
  <line x1="280" y1="440" x2="150" y2="440" stroke="#ef4444" stroke-width="2"/>
  <text x="215" y="430" fill="#ef4444" font-family="Arial, sans-serif" font-size="10">NO</text>
  <rect x="50" y="420" width="100" height="40" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="100" y="445" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="10">Pending</text>
  
  <!-- YES branch -->
  <line x1="350" y1="475" x2="350" y2="505" stroke="#22c55e" stroke-width="2"/>
  <text x="365" y="490" fill="#22c55e" font-family="Arial, sans-serif" font-size="10">YES</text>
  
  <!-- Consent Recorded -->
  <rect x="250" y="510" width="200" height="35" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="532" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="10">Consent Recorded + Timestamp</text>
  
  <!-- Arrow -->
  <line x1="350" y1="545" x2="350" y2="565" stroke="#64748b" stroke-width="2"/>
  
  <!-- Account Activated -->
  <rect x="275" y="570" width="150" height="25" rx="8" fill="#166534" stroke="#22c55e" stroke-width="2"/>
  <text x="350" y="587" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">Account Activated</text>
  
  <!-- Compliance note -->
  <rect x="500" y="350" width="180" height="100" rx="5" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="590" y="375" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10" font-weight="bold">COPPA Compliance</text>
  <text x="510" y="395" fill="#64748b" font-family="Arial, sans-serif" font-size="9">• Minimal PII collected</text>
  <text x="510" y="410" fill="#64748b" font-family="Arial, sans-serif" font-size="9">• Birth year only (no DOB)</text>
  <text x="510" y="425" fill="#64748b" font-family="Arial, sans-serif" font-size="9">• Parental verification</text>
  <text x="510" y="440" fill="#64748b" font-family="Arial, sans-serif" font-size="9">• Research consent separate</text>
</svg>
